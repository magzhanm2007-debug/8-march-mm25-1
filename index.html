<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>8 Марта | Приглашение</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <h1>С 8 Марта 🌸</h1>
    <p class="subtitle">
        Этот день посвящён вам —  
        самым ярким и прекрасным девушкам нашей группы.
    </p>

    <button id="openBtn">Открыть приглашение</button>

    <div class="invite hidden" id="inviteBlock">
        <h2>Приглашение</h2>
        <p>
            📅 Дата: 8 марта<br>
            🕒 Время: 18:00<br>
            📍 Место: (укажи своё место)
        </p>

        <button id="confirmBtn">Я приду ✨</button>
        <p class="thanks hidden" id="thanksText">
            Будем ждать с нетерпением 💖
        </p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
